services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conectawork_app
      POSTGRES_PASSWORD: conectawork_app
      POSTGRES_DB: conectawork
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conectawork_app -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --loglevel warning
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # Secretos (SECRET_KEY, MAILSAAS_API_KEY, GROQ_API_KEY) fuera de git: ver .env.runtime
    env_file:
      - .env.runtime
    environment:
      DATABASE_URL: postgresql+asyncpg://conectawork_app:conectawork_app@db:5432/conectawork
      REDIS_URL: redis://redis:6379/0
      FROM_EMAIL: noreply@working.conectaai.cl
      FROM_NAME: WorkShopOS
      CORS_ORIGINS: https://working.conectaai.cl
      ENVIRONMENT: production
    restart: unless-stopped

volumes:
  pgdata:
